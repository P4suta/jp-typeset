<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jp-typeset/enhance — CDN(IIFE)ドロップイン</title>
    <!-- 2 行ドロップイン: ① CSS プリセット ② enhance 自動初期化スクリプト。 -->
    <link rel="stylesheet" href="/dist/jp-typeset.css" />
    <script src="/dist/enhance.iife.js" defer></script>
    <style>
      body {
        margin-inline: auto;
        max-inline-size: 32rem;
        padding: 2rem;
        font-family: "Noto Sans CJK JP", "Noto Sans JP", sans-serif;
      }
      .narrow {
        max-inline-size: 9em;
      }
    </style>
  </head>
  <body>
    <!-- 自動初期化で見出しが文節単位に折れる(native auto-phrase 環境では no-op)。 -->
    <h2 data-test="heading-plain">日本語組版処理の要件を満たす自動改行の実装例です</h2>

    <h2 data-test="heading-markup">
      <ruby>青空<rp>(</rp><rt>あおぞら</rt><rp>)</rp></ruby>の下で<em>大切な一日</em>を過ごした記録
    </h2>

    <p data-test="body-para">本文の段落。文節改行は見出し限定のため、ここには wbr を入れない。</p>

    <!-- 縦書きでも自動初期化(文節改行)が効く。論理プロパティ基盤＋JS の writing-mode 対応。 -->
    <div class="jp-vertical" lang="ja" style="inline-size: 8em">
      <h2 data-test="v-heading">日本語組版処理の要件を満たす自動改行の実装例です</h2>
    </div>
  </body>
</html>
