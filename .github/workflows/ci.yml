name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ローカルと同一の Docker 環境(フォント・ブラウザ・just・typos 同梱)で検証し、
      # 視覚回帰の基準画像も同じレンダリングで揃える。コンテナは非root(UID/GID 1000)で動く。
      - name: Align workspace ownership to container user (UID 1000)
        run: sudo chown -R 1000:1000 .

      - name: Build dev image
        run: docker compose build

      - name: Install dependencies
        run: docker compose run --rm -T dev pnpm install --frozen-lockfile

      - name: Lint / format / typecheck / typos / build / computed tests (gating)
        run: docker compose run --rm -T dev pnpm run ci:gate

      # 視覚回帰は環境(エンジン・フォント)依存で、フォント更新時に割れうるため非ゲート。
      # 決定論的な検証は上の computed テストが担う。差分はアーティファクトで確認する。
      - name: Visual regression (informational, non-gating)
        continue-on-error: true
        run: docker compose run --rm -T dev pnpm run test:visual

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
